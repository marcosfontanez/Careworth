name: Web CI

on:
  push:
    branches: [main, master]
    paths:
      - "web/**"
      - ".github/workflows/web-ci.yml"
  pull_request:
    paths:
      - "web/**"
      - ".github/workflows/web-ci.yml"
  workflow_dispatch: {}

defaults:
  run:
    working-directory: web

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm run test

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: E2E + accessibility (production server)
        env:
          CI: true
        run: npm run test:e2e:ci

  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install
        working-directory: web
        run: npm ci

      - name: Lighthouse CI (production server)
        working-directory: web
        env:
          CI: true
        run: npm run test:lhci

      - name: Upload Lighthouse CI results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-ci
          path: web/.lighthouseci
          if-no-files-found: ignore
          retention-days: 14
